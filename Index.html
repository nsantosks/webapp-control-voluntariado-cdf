    <script>
      // Variable de estado global de la aplicación en tiempo de ejecución
      let sesionUsuario = null;

      // Evaluador de punto de entrada atómico
      window.onload = function() {
        refrescarSesionLocal();
        if (!sesionUsuario) {
          cargarVista('auth');
        } else {
          cargarVista('perfil');
        }
      };

      /**
       * Sincroniza la memoria en tiempo de ejecución con el almacenamiento de sesión
       */
      function refrescarSesionLocal() {
        window.sesionUsuario = JSON.parse(sessionStorage.getItem('userProfile')) || null;
        sesionUsuario = window.sesionUsuario;
      }

      /**
       * Orquestador de Enrutamiento del Lado del Cliente (SPA)
       * Clonación segura de fragmentos de plantillas y disparo explícito de ciclo de vida
       */
      function cargarVista(vista) {
        refrescarSesionLocal();
        const container = document.getElementById('appContainer');
        if (!container) return;
        
        container.innerHTML = ''; 
        
        const template = document.getElementById(`template-${vista}`);
        if (template) {
          const clon = template.content.cloneNode(true);
          container.appendChild(clon);
          
          // Re-evaluación e inyección controlada de scripts para asegurar la ejecución del ciclo de vida
          const scripts = container.querySelectorAll('script');
          scripts.forEach(script => {
            const nuevoScript = document.createElement('script');
            nuevoScript.text = script.text;
            script.parentNode.replaceChild(nuevoScript, script);
          });

          // DISPARO EXPLÍCITO DEL CICLO DE VIDA SI SE ENTRA A LA VISTA DE PERFIL
          if (vista === 'perfil') {
              setTimeout(function() {
                  if (typeof window.inicializarPerfilModulo === "function") {
                      window.inicializarPerfilModulo();
                  }
              }, 60);
          }
        } else {
          console.error(`La vista solicitada no está registrada en el pipeline: ${vista}`);
        }
      }

      /**
       * Abre las políticas de privacidad bajo demanda desde el pie de página
       */
      function verPoliticasIndependientes() {
          const body = document.getElementById('modalGuardiaBody');
          const footer = document.getElementById('modalGuardiaFooter');
          const closeBtn = document.querySelector('#modalGuardia .btn-close');
          
          // Restauramos botones por si venimos del formulario bloqueado
          if(footer) footer.style.display = 'none';
          if(closeBtn) closeBtn.style.display = 'block';
          
          body.innerHTML = `
              <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                  <h5 class="fw-bold text-primary m-0"><i class="fa-solid fa-shield-halved me-2"></i>Términos y Políticas</h5>
              </div>
              <div id="contenedorVistaPoliticas" class="text-start"></div>
              <div class="text-center mt-3">
                  <button class="btn btn-secondary w-100" data-bs-dismiss="modal">Entendido y Cerrar</button>
              </div>
          `;
          
          // Inyectamos la plantilla de políticas que creamos
          const tplPol = document.getElementById('template-politicas');
          if (tplPol) document.getElementById('contenedorVistaPoliticas').appendChild(tplPol.content.cloneNode(true));
          
          // Mostramos el modal
          const modalElem = document.getElementById('modalGuardia');
          modalElem.removeAttribute('data-bs-backdrop'); // Quitamos el bloqueo
          modalElem.removeAttribute('data-bs-keyboard');
          const modal = bootstrap.Modal.getOrCreateInstance(modalElem);
          modal.show();
      }
    </script>
