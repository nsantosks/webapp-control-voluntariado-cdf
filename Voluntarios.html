<div class="row justify-content-center animate__animated animate__fadeIn">
  <div class="col-12 col-md-10">
    
    <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm border-start border-4 border-primary">
      <div>
        <h4 class="mb-0 fw-bold text-dark"><i class="fa-solid fa-users-gear me-2 text-primary"></i>Gestión de Personal Operativo</h4>
        <small class="text-muted">Consola de Traslado y Control de Eslabones</small>
      </div>
      <button type="button" class="btn btn-sm btn-outline-secondary" onclick="cargarVista('perfil')">
        <i class="fa-solid fa-chevron-left me-1"></i> Volver a Mi Perfil
      </button>
    </div>

    <div class="card shadow-sm border-0 mb-4 bg-white">
      <div class="card-body p-3">
        <div class="row g-3 align-items-center">
          <div class="col-12 col-md-6">
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-magnifying-glass text-muted"></i></span>
              <input type="text" id="txtBusquedaVoluntario" class="form-control border-start-0 bg-light" 
                     placeholder="Buscar por nombre, cédula o especialidad..." onkeyup="ejecutarFiltroAgenda()">
            </div>
          </div>
          <div class="col-12 col-md-6 d-flex justify-content-md-end gap-3 flex-wrap">
            <div class="form-check form-switch pt-1">
              <input class="form-check-input input-filtro-estado" type="checkbox" id="switchVerificados" checked onchange="ejecutarFiltroAgenda()">
              <label class="form-check-label small fw-semibold text-secondary" for="switchVerificados">Verificados</label>
            </div>
            <div class="form-check form-switch pt-1">
              <input class="form-check-input input-filtro-estado" type="checkbox" id="switchPendientes" checked onchange="ejecutarFiltroAgenda()">
              <label class="form-check-label small fw-semibold text-secondary" for="switchPendientes">Por Verificar</label>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-3" id="contenedorAgendaVoluntarios">
      <div class="col-12 text-center p-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="text-muted mt-2">Compilando Directorio del Maestro...</p>
      </div>
    </div>

  </div>
</div>

<script>
  let poolVoluntarios = []; // Buffer local en memoria

  /**
   * Ciclo de vida inicial del componente
   */
  (function iniciarModuloVoluntarios() {
    google.script.run
      .withSuccessHandler(lista => {
        poolVoluntarios = lista;
        renderizarAgendaTarjetas(poolVoluntarios);
      })
      .withFailureHandler(err => {
        document.getElementById('contenedorAgendaVoluntarios').innerHTML = `
          <div class="col-12 text-center text-danger p-4">
            <i class="fa-solid fa-triangle-exclamation fs-2"></i>
            <p class="mt-2">Error de comunicación con el maestro de datos.</p>
          </div>`;
      })
      .obtenerTodosLosVoluntarios();
  })();

  /**
   * Renderiza el listado en formato agenda tipo tarjetas
   */
  function renderizarAgendaTarjetas(lista) {
    const contenedor = document.getElementById('contenedorAgendaVoluntarios');
    if (!contenedor) return;
    contenedor.innerHTML = '';

    if (lista.length === 0) {
      contenedor.innerHTML = `
        <div class="col-12 text-center py-5">
          <i class="fa-solid fa-folder-open text-muted fs-1 mb-2"></i>
          <p class="text-muted small">No coinciden especialistas bajo los filtros seleccionados.</p>
        </div>`;
      return;
    }

    lista.forEach(vol => {
      const avatarSrc = (vol.imagen_profile && vol.imagen_profile.trim() !== "") ? vol.imagen_profile : "https://placehold.co/70x70/f1f5f9/1e3a8a?text=" + (vol.nombre ? vol.nombre.charAt(0) : "V");
      
      // CORRECCIÓN: Clases oficiales de Bootstrap 5 para sub-tonos consistentes (.bg-success-subtle)
      const badgeVerificacion = vol.verificado 
        ? `<span class="badge bg-success-subtle text-success border border-success-subtle px-2 py-1 small rounded-pill"><i class="fa-solid fa-circle-check me-1"></i>Verificado</span>`
        : `<span class="badge bg-warning-subtle text-warning border border-warning-subtle px-2 py-1 small rounded-pill"><i class="fa-solid fa-clock me-1"></i>Pendiente</span>`;

      const card = document.createElement('div');
      card.className = "col-12 col-sm-6 col-lg-4 animate__animated animate__fadeInUp";
      card.innerHTML = `
      <div class="card border-0 shadow-sm h-100 bg-white">
        <div class="card-body p-3 d-flex flex-column justify-content-between">
          <div class="d-flex align-items-start gap-3">
            <img src="${avatarSrc}" class="rounded-circle border border-2 border-light shadow-sm" 
                style="width: 60px; height: 60px; object-fit: cover; flex-shrink: 0;">
            
            <div style="min-width: 0;">
              <h6 class="mb-0 fw-bold text-truncate ${vol.banned ? 'text-danger' : 'text-dark'}" title="${vol.nombre}">
                  ${vol.banned ? '<i class="fa-solid fa-user-slash me-1"></i>' : ''} ${vol.nombre || 'Sin Nombre'}
              </h6>
              <div class="text-muted small font-monospace mb-1" style="font-size:0.75rem;">${vol.cedula || 'Cédula N/D'}</div>
              <div class="small fw-semibold text-primary text-truncate mb-1"><i class="fa-solid fa-user-doctor me-1"></i>${vol.especialidad || 'N/D'}</div>
              <div class="text-muted text-truncate" style="font-size:0.75rem;"><i class="fa-solid fa-location-dot me-1 text-secondary"></i>${vol.direccion || 'Sin dirección'}</div>
              <div class="text-muted text-truncate" style="font-size:0.75rem;"><i class="fa-solid fa-envelope me-1"></i>${vol.email}</div>
            </div>
          </div>
          
          <div class="border-top pt-2 mt-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
              ${badgeVerificacion}
              <div class="form-check form-switch m-0">
                  <input class="form-check-input" type="checkbox" id="switchVol-${vol.id}" ${vol.verificado ? 'checked' : ''} onchange="conmutarVerificacionServidor('${vol.id}', this)">
                  <label class="form-check-label text-muted small" for="switchVol-${vol.id}">Validar</label>
              </div>
            </div>
            <!-- NUEVO: Switch de Baneo (Punto 2) -->
            <div class="d-flex justify-content-between align-items-center p-2 rounded ${vol.banned ? 'bg-danger-subtle' : 'bg-light'}">
              <span class="small fw-bold ${vol.banned ? 'text-danger' : 'text-muted'}">Acceso al Sistema</span>
              <div class="form-check form-switch m-0">
                  <input class="form-check-input" type="checkbox" id="switchBan-${vol.id}" ${vol.banned ? 'checked' : ''} onchange="conmutarBaneoServidor('${vol.id}', this)">
                  <label class="form-check-label small ${vol.banned ? 'text-danger fw-bold' : 'text-muted'}" for="switchBan-${vol.id}">
                      ${vol.banned ? 'Baneado' : 'Activo'}
                  </label>
              </div>
            </div>
          </div>
        </div>
      </div>
      `;
      contenedor.appendChild(card);
    });
  }

  /**
   * Motor de búsqueda y filtrado de la agenda
   */
  function ejecutarFiltroAgenda() {
    const query = document.getElementById('txtBusquedaVoluntario').value.toLowerCase().trim();
    const verifCheck = document.getElementById('switchVerificados').checked;
    const pendCheck = document.getElementById('switchPendientes').checked;

    const listaFiltrada = poolVoluntarios.filter(vol => {
      if (vol.verificado && !verifCheck) return false;
      if (!vol.verificado && !pendCheck) return false;
      if (query === "") return true;
      
      const matchNombre = vol.nombre.toLowerCase().includes(query);
      const matchCedula = vol.cedula.toLowerCase().includes(query);
      const matchEsp = vol.especialidad.toLowerCase().includes(query);
      const matchDir = (vol.direccion || "").toLowerCase().includes(query); // <-- NUEVO

      return (matchNombre || matchCedula || matchEsp || matchDir);
    });

    renderizarAgendaTarjetas(listaFiltrada);
  }

  /**
   * Despacha el cambio atómico de estatus a Google Sheets
   */
  function conmutarVerificacionServidor(idVoluntario, switchElem) {
    const proximoEstatus = switchElem.checked ? "Verificado" : "No Verificado";
    switchElem.disabled = true;

    google.script.run
      .withSuccessHandler(res => {
        switchElem.disabled = false;
        if (res && res.status === "SUCCESS") {
          const idx = poolVoluntarios.findIndex(v => v.id === idVoluntario);
          if (idx !== -1) {
            poolVoluntarios[idx].verificado = switchElem.checked;
          }
          ejecutarFiltroAgenda();
        } else {
          alert("Error al conmutar credenciales: " + res.message);
          switchElem.checked = !switchElem.checked;
        }
      })
      .withFailureHandler(err => {
        switchElem.disabled = false;
        switchElem.checked = !switchElem.checked;
        alert("Fallo crítico de comunicación con el núcleo operativo.");
      })
      .cambiarEstatusVerificacion(idVoluntario, proximoEstatus);
  }

  /**
   * Despacha la instrucción de baneo/bloqueo al servidor
   */
  function conmutarBaneoServidor(idVoluntario, switchElem) {
      const esBaneado = switchElem.checked;
      switchElem.disabled = true;

      google.script.run
        .withSuccessHandler(res => {
          switchElem.disabled = false;
          if (res && res.status === "SUCCESS") {
            const idx = poolVoluntarios.findIndex(v => v.id === idVoluntario);
            if (idx !== -1) {
              poolVoluntarios[idx].banned = esBaneado;
            }
            ejecutarFiltroAgenda(); // Refrescar vista
          } else {
            alert("Error al procesar bloqueo: " + res.message);
            switchElem.checked = !switchElem.checked;
          }
        })
        .withFailureHandler(err => {
          switchElem.disabled = false;
          switchElem.checked = !switchElem.checked;
          alert("Fallo de red al intentar bloquear el perfil.");
        })
        .cambiarEstatusBaneo(idVoluntario, esBaneado);
  }

</script>
